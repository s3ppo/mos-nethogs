name: Build and Release

on:
  push:
    tags:
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: '0.0.1'
        required: true
        default: '0.0.1'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Vue plugin
        working-directory: page
        env:
          PLUGIN_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          npm install
          npm run build

      - name: Create package structure
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          PKG_NAME="mos-nethogs-${VERSION}-1+mos-plugin"
          PKG_DIR="${PKG_NAME}_amd64"

          mkdir -p ${PKG_DIR}/var/www/mos-plugins/mos-nethogs
          mkdir -p ${PKG_DIR}/usr/bin/plugins
          mkdir -p ${PKG_DIR}/DEBIAN

          cp -R page/dist/mos-nethogs/* ${PKG_DIR}/var/www/mos-plugins/mos-nethogs/
          cp functions ${PKG_DIR}/var/www/mos-plugins/mos-nethogs/functions
          cp settings.json ${PKG_DIR}/var/www/mos-plugins/mos-nethogs/settings.json
          cp mos-nethogs-install.sh ${PKG_DIR}/usr/bin/plugins/mos-nethogs-install
          chmod +x ${PKG_DIR}/var/www/mos-plugins/mos-nethogs/functions
          chmod +x ${PKG_DIR}/usr/bin/plugins/mos-nethogs-install

          echo "IyEvYmluL3NoCnNldCAtZQoKaWYgWyAiJDEiID0gImNvbmZpZ3VyZSIgXTsgdGhlbgogIGlmIFsgLXggL3Vzci9iaW4vcGx1Z2lucy9tb3MtbmV0aG9ncy1pbnN0YWxsIF07IHRoZW4KICAgIC91c3IvYmluL3BsdWdpbnMvbW9zLW5ldGhvZ3MtaW5zdGFsbCB8fCB0cnVlCiAgZmkKZmkKCmV4aXQgMAo=" | base64 -d > ${PKG_DIR}/DEBIAN/postinst
          chmod 755 ${PKG_DIR}/DEBIAN/postinst

          echo "UGFja2FnZTogbW9zLW5ldGhvZ3MKVmVyc2lvbjogVkVSU0lPTl9QTEFDRUhPTERFUi0xK21vcy1wbHVnaW4KQXJjaGl0ZWN0dXJlOiBhbWQ2NApNYWludGFpbmVyOiBhZG1pbkBtaW5lbmV0LmF0CkRlcGVuZHM6IHB5dGhvbjMsIGFwdApEZXNjcmlwdGlvbjogTmV0aG9ncyBOZXR3b3JrIE1vbml0b3IgUGx1Z2luIGZvciBNT1MK" | base64 -d | sed "s/VERSION_PLACEHOLDER/${VERSION}/" > ${PKG_DIR}/DEBIAN/control

      - name: Build .deb package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          PKG_NAME="mos-nethogs-${VERSION}-1+mos-plugin"
          PKG_DIR="${PKG_NAME}_amd64"
          DEB_FILE="${PKG_NAME}_amd64.deb"

          dpkg-deb --build ${PKG_DIR}

          md5sum ${DEB_FILE} | awk '{print $1}' > ${DEB_FILE}.md5

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: mos-nethogs ${{ steps.version.outputs.VERSION }}
          body: |
            ## mos-nethogs Plugin ${{ steps.version.outputs.VERSION }}

          files: |
            mos-nethogs-${{ steps.version.outputs.VERSION }}-1+mos-plugin_amd64.deb
            mos-nethogs-${{ steps.version.outputs.VERSION }}-1+mos-plugin_amd64.deb.md5
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}