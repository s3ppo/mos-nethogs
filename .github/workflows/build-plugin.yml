name: Build and Release

on:
  push:
    tags:
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: '0.0.1'
        required: true
        default: '0.0.1'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Vue plugin
        working-directory: page
        env:
          PLUGIN_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          npm install
          npm run build

      - name: Create package structure
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          PKG_NAME="mos-nethogs-${VERSION}-1+mos-plugin"
          PKG_DIR="${PKG_NAME}_amd64"

          mkdir -p ${PKG_DIR}/var/www/mos-plugins/mos-nethogs
          mkdir -p ${PKG_DIR}/usr/bin/plugins
          mkdir -p ${PKG_DIR}/DEBIAN

          cp -R page/dist/mos-nethogs/* ${PKG_DIR}/var/www/mos-plugins/mos-nethogs/
          cp functions ${PKG_DIR}/var/www/mos-plugins/mos-nethogs/functions
          cp settings.json ${PKG_DIR}/var/www/mos-plugins/mos-nethogs/settings.json
          cp mos-nethogs-install.sh ${PKG_DIR}/usr/bin/plugins/mos-nethogs-install
          chmod +x ${PKG_DIR}/var/www/mos-plugins/mos-nethogs/functions
          chmod +x ${PKG_DIR}/usr/bin/plugins/mos-nethogs-install

          cat > ${PKG_DIR}/DEBIAN/postinst << 'EOF'
          #!/bin/sh
          set -e

          if [ "$1" = "configure" ]; then
            # Try to extract version from package filename instead of dpkg -s
            # This avoids dpkg lock issues
            PKG_VERSION=$(cat /var/lib/dpkg/status.d/* 2>/dev/null | grep -A2 "Package: mos-nethogs" | grep "Version:" | head -1 | awk '{print $2}' | sed 's/-1+mos-plugin//' || echo "")
            
            # Fallback: extract from package metadata if available
            if [ -z "$PKG_VERSION" ]; then
              PKG_VERSION=$(dpkg-query -W -f='${Version}' mos-nethogs 2>/dev/null | sed 's/-1+mos-plugin//' || echo "")
            fi
            
            # If we still don't have version, try reading from control file during install
            if [ -z "$PKG_VERSION" ]; then
              PKG_VERSION=$(grep "^Version:" /var/cache/apt/archives/mos-nethogs*.deb 2>/dev/null | head -1 | awk '{print $2}' | sed 's/-1+mos-plugin//' || echo "0.0.0")
            fi
            
            PLG_DIR="/boot/optional/plugins/mos-nethogs"
            
            # Create version directory
            mkdir -p "${PLG_DIR}/${PKG_VERSION}"
            
            # Copy plugin files from /var/www/mos-plugins/mos-nethogs/ to version directory
            if [ -d "/var/www/mos-plugins/mos-nethogs" ]; then
              cp -R /var/www/mos-plugins/mos-nethogs/* "${PLG_DIR}/${PKG_VERSION}/" 2>/dev/null || true
              
              # Make functions executable if it exists
              if [ -f "${PLG_DIR}/${PKG_VERSION}/functions" ]; then
                chmod +x "${PLG_DIR}/${PKG_VERSION}/functions"
              fi
            fi
            
            # Run installer if available (with retry for dpkg lock)
            if [ -x /usr/bin/plugins/mos-nethogs-install ]; then
              max_attempts=5
              attempt=1
              while [ $attempt -le $max_attempts ]; do
                if /usr/bin/plugins/mos-nethogs-install; then
                  break
                fi
                if [ $attempt -lt $max_attempts ]; then
                  sleep 2
                fi
                attempt=$((attempt + 1))
              done || true
            fi
          fi

          exit 0
          EOF
          chmod 755 ${PKG_DIR}/DEBIAN/postinst

          cat > ${PKG_DIR}/DEBIAN/control << EOF
          Package: mos-nethogs
          Version: ${VERSION}-1+mos-plugin
          Architecture: amd64
          Maintainer: admin@minenet.at
          Depends: python3, apt
          Description: Nethogs Network Monitor Plugin for MOS
          EOF

      - name: Build .deb package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          PKG_NAME="mos-nethogs-${VERSION}-1+mos-plugin"
          PKG_DIR="${PKG_NAME}_amd64"
          DEB_FILE="${PKG_NAME}_amd64.deb"

          dpkg-deb --build ${PKG_DIR}

          md5sum ${DEB_FILE} | awk '{print $1}' > ${DEB_FILE}.md5

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: mos-nethogs ${{ steps.version.outputs.VERSION }}
          body: |
            ## mos-nethogs Plugin ${{ steps.version.outputs.VERSION }}

          files: |
            mos-nethogs-${{ steps.version.outputs.VERSION }}-1+mos-plugin_amd64.deb
            mos-nethogs-${{ steps.version.outputs.VERSION }}-1+mos-plugin_amd64.deb.md5
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
